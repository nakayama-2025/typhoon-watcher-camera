<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>設置端末カメラ - Typhoon-Watcher</title>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
    video { width: 100%; background: #000; margin-bottom: 10px; border-radius: 4px; }
    canvas { display: none; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 10px 15px; margin-right: 10px; margin-bottom: 10px; cursor: pointer; border: none; border-radius: 4px; background: #28a745; color: white; font-weight: bold; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .btn-secondary { background: #6c757d; }
    .btn-danger { background: #dc3545; }
    #status { padding: 10px; margin-top: 10px; border-radius: 4px; display: none; font-weight: bold; }
    .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .info { background: #cce5ff; color: #004085; border: 1px solid #b8daff; }
  </style>
</head>
<body>
<h2>設置端末カメラ (Ver 0.3・1分テスト)</h2>
  
  <!-- 設定エリア -->
  <div class="form-group">
    <label for="cameraId">カメラID (例: CAM-001)</label>
    <input type="text" id="cameraId" placeholder="CAM-001">
  </div>
  <div class="form-group">
    <label for="location">設置場所</label>
    <input type="text" id="location" placeholder="紙保管倉庫_奥天井">
  </div>
  <div class="form-group">
    <label for="token">端末トークン</label>
    <input type="password" id="token" placeholder="トークンを入力">
  </div>
  <div>
    <button id="saveConfigBtn" class="btn-secondary">設定保存</button>
    <button id="clearConfigBtn" class="btn-danger">設定削除</button>
  </div>

  <hr>

  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>

  <div>
    <button id="startCameraBtn">カメラ起動</button>
    <button id="manualCaptureBtn" disabled>今すぐ手動撮影送信</button>
  </div>

  <div>
    <button id="startAutoCaptureBtn" disabled>
      自動撮影開始（1分テスト）
    </button>
    <button id="stopAutoCaptureBtn" class="btn-danger" disabled>
      自動撮影停止
    </button>
  </div>

  <div
    id="countdown"
    class="info"
    style="display:none; padding:10px; margin-top:10px; border-radius:4px; font-weight:bold;"
  ></div>

  <div id="status"></div>

  <script>
    // ------------------------------------
    // GASのURLはデプロイ後に手動で置き換えます
    // ※ 秘密情報はコード内に直接書かないでください
    // ------------------------------------
    const GAS_ENDPOINT_URL = "https://script.google.com/macros/s/AKfycbzi6yJz6vIEJ3c0g5P_QdZlXSMEOphWZCaZPxuCGGjLz0fBLxFlOcafKASK5S78bvelIQ/exec";
    
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const startCameraBtn = document.getElementById('startCameraBtn');
    const manualCaptureBtn = document.getElementById('manualCaptureBtn');

    const startAutoCaptureBtn = document.getElementById('startAutoCaptureBtn');
    const stopAutoCaptureBtn = document.getElementById('stopAutoCaptureBtn');
    const countdownDiv = document.getElementById('countdown');
    
    const inputCameraId = document.getElementById('cameraId');
    const inputLocation = document.getElementById('location');
    const inputToken = document.getElementById('token');
    const saveConfigBtn = document.getElementById('saveConfigBtn');
    const clearConfigBtn = document.getElementById('clearConfigBtn');
    
    const statusDiv = document.getElementById('status');

    // 自動撮影間隔：Version 0.3の動作試験中は1分
    const AUTO_CAPTURE_INTERVAL_MS = 60 * 1000;

    let stream = null;
    let autoCaptureTimerId = null;
    let countdownTimerId = null;
    let nextCaptureAt = null;
    let isSending = false;
    let isAutoCaptureRunning = false;
    let wakeLock = null;

    // --- localStorage 関連 ---
    const STORAGE_KEYS = {
      cameraId: 'typhoonWatcher.cameraId',
      location: 'typhoonWatcher.location',
      token: 'typhoonWatcher.token'
    };

    function loadConfig() {
      inputCameraId.value = localStorage.getItem(STORAGE_KEYS.cameraId) || '';
      inputLocation.value = localStorage.getItem(STORAGE_KEYS.location) || '';
      inputToken.value = localStorage.getItem(STORAGE_KEYS.token) || '';
    }

    saveConfigBtn.addEventListener('click', () => {
      localStorage.setItem(STORAGE_KEYS.cameraId, inputCameraId.value.trim());
      localStorage.setItem(STORAGE_KEYS.location, inputLocation.value.trim());
      localStorage.setItem(STORAGE_KEYS.token, inputToken.value.trim());
      showStatus('設定を保存しました', 'success');
    });

    clearConfigBtn.addEventListener('click', () => {
      localStorage.removeItem(STORAGE_KEYS.cameraId);
      localStorage.removeItem(STORAGE_KEYS.location);
      localStorage.removeItem(STORAGE_KEYS.token);
      inputCameraId.value = '';
      inputLocation.value = '';
      inputToken.value = '';
      showStatus('設定を削除しました', 'info');
    });

    // 初期読み込み
    loadConfig();

    // --- ステータス表示 ---
    function showStatus(msg, type = 'info') {
      statusDiv.style.display = 'block';
      statusDiv.textContent = msg;
      statusDiv.className = type;
    }

    // --- 自動撮影カウントダウン ---
    function updateCountdownDisplay() {
      if (!nextCaptureAt) {
        countdownDiv.style.display = 'none';
        countdownDiv.textContent = '';
        return;
      }

      const remainingMs = Math.max(0, nextCaptureAt - Date.now());
      const totalSeconds = Math.ceil(remainingMs / 1000);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;

      countdownDiv.style.display = 'block';
      countdownDiv.textContent =
        `次回の自動撮影まで ${minutes}:${String(seconds).padStart(2, '0')}`;
    }

    function startCountdown() {
      if (countdownTimerId !== null) {
        clearInterval(countdownTimerId);
      }

      updateCountdownDisplay();

      countdownTimerId = setInterval(() => {
        updateCountdownDisplay();
      }, 1000);
    }

    function stopCountdown() {
      if (countdownTimerId !== null) {
        clearInterval(countdownTimerId);
        countdownTimerId = null;
      }

      nextCaptureAt = null;
      countdownDiv.style.display = 'none';
      countdownDiv.textContent = '';
    }

    // --- Wake Lock ---
    async function requestWakeLock() {
      if (!('wakeLock' in navigator)) {
        console.log('この端末はWake Lockに対応していません');
        return;
      }

      try {
        wakeLock = await navigator.wakeLock.request('screen');

        wakeLock.addEventListener('release', () => {
          wakeLock = null;
          console.log('Wake Lockが解除されました');
        });

        console.log('Wake Lockを取得しました');
      } catch (err) {
        wakeLock = null;
        console.log(`Wake Lock取得エラー: ${err.name} - ${err.message}`);
      }
    }

    async function releaseWakeLock() {
      if (wakeLock !== null) {
        try {
          await wakeLock.release();
        } catch (err) {
          console.log(`Wake Lock解除エラー: ${err.message}`);
        } finally {
          wakeLock = null;
        }
      }
    }

    // --- カメラ操作 ---
    startCameraBtn.addEventListener('click', async () => {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
        video.srcObject = stream;
        
        manualCaptureBtn.disabled = false;
        startAutoCaptureBtn.disabled = false;
        showStatus('カメラを起動しました', 'success');
      } catch (err) {
        showStatus(`カメラ起動エラー: ${err.name} - ${err.message}`, 'error');
      }
    });

    async function captureAndSend() {
      if (isSending) {
        showStatus('送信中のため、今回の撮影は見送りました', 'info');
        return;
      }

      const cameraId = inputCameraId.value.trim();
      const location = inputLocation.value.trim();
      const token = inputToken.value.trim();

      // 送信条件のチェック
      if (!cameraId || !location || !token) {
        showStatus('エラー: カメラID、設置場所、トークンをすべて入力・保存してください', 'error');
        return;
      }
      if (!stream || !stream.active) {
        showStatus('エラー: カメラが停止しています。再度カメラを起動してください', 'error');
        return;
      }
      if (video.videoWidth === 0 || video.videoHeight === 0) {
        showStatus('エラー: 撮影画像がまだ生成されていません', 'error');
        return;
      }
      if (GAS_ENDPOINT_URL === "__GAS_WEB_APP_URL__") {
        showStatus('エラー: GAS URL未設定。送信を停止しました', 'error');
        return;
      }

      // 手動撮影と自動撮影の重複送信を防止
      isSending = true;
      manualCaptureBtn.disabled = true;
      showStatus('送信準備中...', 'info');

      try {
        // 画像の圧縮設定 (長辺1280px程度)
        const MAX_DIMENSION = 1280;
        let width = video.videoWidth;
        let height = video.videoHeight;
        
        if (width > MAX_DIMENSION || height > MAX_DIMENSION) {
          if (width > height) {
            height = Math.floor(height * (MAX_DIMENSION / width));
            width = MAX_DIMENSION;
          } else {
            width = Math.floor(width * (MAX_DIMENSION / height));
            height = MAX_DIMENSION;
          }
        }

        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, width, height);
        
        // JPEG品質0.8
        const dataUrl = canvas.toDataURL('image/jpeg', 0.80);
        // Base64本体のみを抽出
        const base64Data = dataUrl.replace(/^data:image\/jpeg;base64,/, "");

        const payload = {
          camera_id: cameraId,
          location: location,
          token: token,
          image_data: base64Data
        };

        showStatus('送信中...', 'info');

        // CORSプリフライト回避のため text/plain で送信
        const response = await fetch(GAS_ENDPOINT_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8'
          },
          body: JSON.stringify(payload)
        });
        
        const resData = await response.json();
        
        if (resData && resData.status === 'success') {
          showStatus(`保存成功: ${new Date().toLocaleTimeString()}`, 'success');
        } else {
          // 認証失敗やGAS側のバリデーションエラー
          // ※トークンは自動削除せず、修正できるように残す
          const errMsg = resData ? resData.message : "不明なエラー";
          showStatus(`認証失敗 / 保存エラー: ${errMsg}`, 'error');
        }
      } catch (err) {
        showStatus(`通信エラー: ${err.message}`, 'error');
      } finally {
        isSending = false;

        // 数秒後にボタンを再度有効化（連続クリック防止）
        setTimeout(() => {
          if (stream && stream.active) {
            manualCaptureBtn.disabled = false;
          }
        }, 3000);
      }
    }

    // --- 自動撮影の開始・停止 ---
    function scheduleNextAutoCapture() {
      if (!isAutoCaptureRunning) {
        return;
      }

      nextCaptureAt = Date.now() + AUTO_CAPTURE_INTERVAL_MS;
      startCountdown();

      autoCaptureTimerId = setTimeout(async () => {
        autoCaptureTimerId = null;

        try {
          await captureAndSend();
        } catch (err) {
          // 1回失敗しても自動撮影自体は停止しない
          showStatus(`自動撮影エラー: ${err.message}`, 'error');
        } finally {
          if (isAutoCaptureRunning) {
            scheduleNextAutoCapture();
          }
        }
      }, AUTO_CAPTURE_INTERVAL_MS);
    }

    async function startAutoCapture() {

      // 二重タイマー防止
      if (isAutoCaptureRunning) {
        showStatus('自動撮影はすでに開始されています', 'info');
        return;
      }

      if (!stream || !stream.active) {
        showStatus('エラー: 先にカメラを起動してください', 'error');
        return;
      }

      isAutoCaptureRunning = true;
      startAutoCaptureBtn.disabled = true;
      stopAutoCaptureBtn.disabled = false;

      await requestWakeLock();

      showStatus(
        '自動撮影を開始しました。最初の1枚を撮影します',
        'info'
      );

      // 開始直後に1枚撮影
      try {
        await captureAndSend();
      } catch (err) {
        showStatus(`自動撮影エラー: ${err.message}`, 'error');
      }

      // 最初の撮影中に停止ボタンが押された場合は、
      // タイマーを開始しない
      if (!isAutoCaptureRunning) {
        return;
      }

      scheduleNextAutoCapture();
    }

    async function stopAutoCapture() {
      isAutoCaptureRunning = false;

      if (autoCaptureTimerId !== null) {
        clearTimeout(autoCaptureTimerId);
        autoCaptureTimerId = null;
      }

      stopCountdown();

      startAutoCaptureBtn.disabled =
        !(stream && stream.active);
      stopAutoCaptureBtn.disabled = true;

      await releaseWakeLock();

      showStatus('自動撮影を停止しました', 'info');
    }

    manualCaptureBtn.addEventListener(
      'click',
      captureAndSend
    );

    startAutoCaptureBtn.addEventListener(
      'click',
      startAutoCapture
    );

    stopAutoCaptureBtn.addEventListener(
      'click',
      stopAutoCapture
    );

    // 別画面から戻った際にWake Lockを再取得
    document.addEventListener('visibilitychange', async () => {
      if (
        document.visibilityState === 'visible' &&
        isAutoCaptureRunning &&
        wakeLock === null
      ) {
        await requestWakeLock();
      }
    });
  </script>
</body>
</html>
