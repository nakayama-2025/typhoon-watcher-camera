<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>設置端末カメラ - Typhoon-Watcher</title>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
    video { width: 100%; background: #000; margin-bottom: 10px; border-radius: 4px; }
    canvas { display: none; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 10px 15px; margin-right: 10px; margin-bottom: 10px; cursor: pointer; border: none; border-radius: 4px; background: #28a745; color: white; font-weight: bold; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    #stopAutoBtn { background: #dc3545; display: none; }
    #status { padding: 10px; margin-top: 10px; border-radius: 4px; display: none; }
    .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
  </style>
</head>
<body>
  <h2>設置端末カメラ</h2>
  
  <div class="form-group">
    <label for="cameraId">カメラID</label>
    <input type="text" id="cameraId" value="CAM-001">
  </div>
  <div class="form-group">
    <label for="location">設置場所</label>
    <input type="text" id="location" value="紙保管倉庫_奥天井">
  </div>

  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>

  <div>
    <button id="startCameraBtn">カメラ起動</button>
    <button id="manualCaptureBtn" disabled>今すぐ手動撮影送信</button>
  </div>
  <div>
    <button id="startAutoBtn" disabled>30分間隔の自動撮影 開始</button>
    <button id="stopAutoBtn">自動撮影 停止</button>
  </div>

  <div id="status"></div>

  <script>
    // 送信先 GAS WebアプリのURL（後で実URLに置き換えてください）
    const GAS_ENDPOINT_URL = "__GAS_WEB_APP_URL__";
    
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const startCameraBtn = document.getElementById('startCameraBtn');
    const manualCaptureBtn = document.getElementById('manualCaptureBtn');
    const startAutoBtn = document.getElementById('startAutoBtn');
    const stopAutoBtn = document.getElementById('stopAutoBtn');
    const statusDiv = document.getElementById('status');
    
    let stream = null;
    let autoInterval = null;

    function showStatus(msg, isError = false) {
      statusDiv.style.display = 'block';
      statusDiv.textContent = msg;
      statusDiv.className = isError ? 'error' : 'success';
    }

    startCameraBtn.addEventListener('click', async () => {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
        video.srcObject = stream;
        
        manualCaptureBtn.disabled = false;
        startAutoBtn.disabled = false;
        
        showStatus('カメラを起動しました');
      } catch (err) {
        showStatus(`カメラ起動エラー: ${err.name} - ${err.message}`, true);
      }
    });

    async function captureAndSend() {
      if (!stream) {
        showStatus('カメラが起動していません', true);
        return;
      }
      if (video.videoWidth === 0 || video.videoHeight === 0) {
        showStatus('カメラの映像が取得できません (width/height = 0)', true);
        return;
      }

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      
      const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
      const base64Data = dataUrl.replace(/^data:image\/jpeg;base64,/, "");

      const payload = {
        camera_id: document.getElementById('cameraId').value,
        location: document.getElementById('location').value,
        image_data: base64Data
      };

      showStatus('送信中...');
      try {
        const response = await fetch(GAS_ENDPOINT_URL, {
          method: 'POST',
          // preflight回避やCORSエラー対策のため、あえて text/plain で送るのが確実です。
          // GAS側は JSON.parse(e.postData.contents) で受け取れます。
          headers: {
            'Content-Type': 'text/plain'
          },
          body: JSON.stringify(payload)
        });
        
        const resData = await response.json().catch(() => null);
        
        if (resData && resData.status === 'success') {
          showStatus(`送信成功: ${new Date().toLocaleTimeString()}`);
        } else {
          showStatus(`送信実行完了（ダッシュボード側で確認してください）: ${new Date().toLocaleTimeString()}`);
        }
      } catch (err) {
        showStatus(`送信を実行しました（CORS等で読めない可能性があります・ダッシュボード確認推奨）: ${err.message}`, true);
      }
    }

    manualCaptureBtn.addEventListener('click', captureAndSend);

    startAutoBtn.addEventListener('click', () => {
      captureAndSend();
      autoInterval = setInterval(captureAndSend, 30 * 60 * 1000);
      
      startAutoBtn.style.display = 'none';
      stopAutoBtn.style.display = 'inline-block';
      showStatus('自動撮影を開始しました');
    });

    stopAutoBtn.addEventListener('click', () => {
      if (autoInterval) {
        clearInterval(autoInterval);
        autoInterval = null;
      }
      stopAutoBtn.style.display = 'none';
      startAutoBtn.style.display = 'inline-block';
      showStatus('自動撮影を停止しました');
    });
  </script>
</body>
</html>
